version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    groups:
      astro:
        patterns: ["astro", "@astrojs/*"]
      tailwind:
        patterns: ["tailwindcss", "@tailwindcss/*"]
      dev:
        dependency-type: development
    open-pull-requests-limit: 5
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
